name: Windows RDP Stable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Download ngrok
      run: |
        Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip

    - name: Extract ngrok
      run: |
        Expand-Archive ngrok.zip

    - name: Authenticate ngrok
      run: |
        .\ngrok\ngrok.exe authtoken $Env:NGROK_AUTH_TOKEN
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Enable Remote Desktop
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

    - name: Set Password
      run: |
        net user runneradmin "P@ssw0rd!"

    - name: Start ngrok (Background)
      run: |
        Start-Process -FilePath ".\ngrok\ngrok.exe" -ArgumentList "tcp 3389 --log=stdout"
        Start-Sleep -Seconds 5

    - name: Wait for ngrok & Fetch URL
      run: |
        $maxAttempts = 15
        $attempt = 0
        $connected = $false

        while (-not $connected -and $attempt -lt $maxAttempts) {
            try {
                $tunnel = Invoke-RestMethod http://127.0.0.1:4040/api/tunnels
                if ($tunnel.tunnels.Length -gt 0) {
                    $connected = $true
                }
            } catch {
                Write-Output "⏳ Waiting for ngrok... attempt $attempt"
                Start-Sleep -Seconds 3
                $attempt++
            }
        }

        if (-not $connected) {
            Write-Error "❌ ngrok failed to start"
            Get-Process ngrok -ErrorAction SilentlyContinue
            exit 1
        }

        $publicUrl = $tunnel.tunnels[0].public_url

        Write-Output "======================================="
        Write-Output "✅ RDP CONNECTION DETAILS"
        Write-Output "======================================="
        Write-Output "🌐 Address: $publicUrl"
        Write-Output "👤 Username: runneradmin"
        Write-Output "🔑 Password: P@ssw0rd!"
        Write-Output "======================================="

    - name: Keep Session Alive
      run: |
        Write-Output "🟢 Session active for 6 hours..."
        Start-Sleep -Seconds 21600
